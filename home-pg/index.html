<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <link rel="shortcut icon" href="./image/favicon_48x48.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">

        <!-- Left Section -->
        <div class="header__left">
            <!-- <div class="header__menu-btn"> -->
            <button>
                <img src="./svg/hanburger.svg" alt="">
            </button>
            <!-- </div> -->
            <div class="header__logo" title="YouTube Home">
                <img src="./gif/yt-gif.webp" alt="">
                <div id="country-code">IN</div>
            </div>
        </div>

        <!-- Middle Section -->
        <div class="header__center">
            <div class="header__search-bar">
                <input type="text" placeholder="Search" class="search-input">
                <button class="search-btn" title="Search">
                    <img src="./svg/search-icon.svg" alt="Search">
                </button>
            </div>
            <div class="header__voice-search" title="Search with your voice">
                <img src="./svg/voice-search.svg" alt="">
            </div>
        </div>

        <!-- Right Section -->
        <div class="header__right">
            <div class="header__create-btn">
                <img src="./svg/plus.svg" alt="">
                <p>Create</p>
            </div>
            <div class="header__icon-btns" title="Notifications">
                <div id="notification-marker" hidden>
                    <p id="notification-number">15</p>
                </div>
                <img src="./svg/bell.svg" alt="">
            </div>
            <div class="header__profile">
                <img src="./image/profile-photo.jpg" alt="">
            </div>
        </div>
        <script src="script.js"></script>
    </header>
    <main>
        <aside class="sidebar">
            <div id="aside-cover">
                <div class="sidebar__home-shortcuts">
                    <div class="outer-div-active">
                        <div class="img-div">
                            <img src="./svg/home-inactive-icon.svg" alt="">
                        </div>
                        <p>Home</p>
                    </div>
                    <div class="outer-div">
                        <div class="img-div">
                            <img src="./svg/shorts-inactive-icon.svg" alt="">
                        </div>
                        <p>Shorts</p>
                    </div>
                </div>
                <div class="sidebar__subscriptions">
                    <div class="outer-div heading">
                        <p>Subscriptions <span><img src="./svg/V-arrow.svg" alt=""></span></p>
                    </div>

                    <!-- <div class="outer-div">
                        <div class="img-div">
                            <img src="./svg/home-icon.svg" alt="">
                        </div>
                        <p>Home</p>
                    </div> -->
                </div>
                
                
                <div class="sidebar__library">

                    <div class="outer-div heading">
                        <p>You <span><img src="./svg/V-arrow.svg" alt=""></span></p>
                    </div>

                    <div class="outer-div">
                        <div class="img-div">
                            <img src="./svg/your-channel-inactive-icon.svg" alt="">
                        </div>
                        <p>Your Channel</p>
                    </div>

                    <div class="outer-div">
                        <div class="img-div">
                            <img src="./svg/history-icon.svg" alt="">
                        </div>
                        <p>History</p>
                    </div>

                    <div class="outer-div">
                        <div class="img-div">
                            <img src="./svg/playlist-inactive-icon.svg" alt="">
                        </div>
                        <p>Playlist</p>
                    </div>

                    <div class="outer-div">
                        <div class="img-div">
                            <img src="./svg/watch-later-inactive-icon.svg" alt="">
                        </div>
                        <p>Watch later</p>
                    </div>

                    <div class="outer-div">
                        <div class="img-div">
                            <img src="./svg/liked-videos-inactive-icon.svg" alt="">
                        </div>
                        <p>Linked videos</p>
                    </div>

                    <div class="outer-div">
                        <div class="img-div">
                            <img src="./svg/your-videos-inactive-icon.svg" alt="">
                        </div>
                        <p>Your videos</p>
                    </div>

                    <div class="outer-div">
                        <div class="img-div">
                            <img src="./svg/downloads-icon-inactive-icon.svg" alt="">
                        </div>
                        <p>Downloads</p>
                    </div>
                </div>


                <div class="sidebar__explore"></div>

                <div class="sidebar__more-from-youtube">

                    
                    <div class="outer-div">
                        <div class="img-div">
                            <img src="./svg/Youtube-premium-inactive-icon.svg" alt="">
                        </div>
                        <p>YouTube Premium</p>
                    </div>

                    <div class="outer-div">
                        <div class="img-div">
                            <img src="./svg/youtube-music-inactive-icon.svg" alt="">
                        </div>
                        <p>YouTube Music</p>
                    </div>

                    <div class="outer-div">
                        <div class="img-div">
                            <img src="./svg/youtube-kids-inactive-icon.svg" alt="">
                        </div>
                        <p>YouTube Kids</p>
                    </div>
                </div>
                
                <div class="sidebar__report-history">
                    <div class="outer-div">
                        <div class="img-div">
                            <img src="./svg/report-history-inactive-icon.svg" alt="">
                        </div>
                        <p>Report history</p>
                    </div>
                </div>


                <div class="sidebar__footer">
                    <p><span>About</span> <span>Press</span> <span>Copyright</span> <span>Contact us</span> <span>Creators</span> <span>Advertise</span> <span>Developers</span></p>
                </div>
            </div>
        </aside>

        <div class="main-contant-container">
            <nav></nav>

        </div>
    </main>

</body>

</html>
